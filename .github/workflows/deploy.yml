name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy app files to EC2
        run: |
          scp -i ~/.ssh/deploy_key -r ./cicd-demo ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/cicd-demo

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
            cd /home/ubuntu/cicd-demo
            docker stop cicd-demo || true
            docker rm cicd-demo || true
            docker build -t cicd-demo .
            docker run -d -p 3000:3000 --name cicd-demo cicd-demo
            echo "Deployment complete!"
          ENDSSH
